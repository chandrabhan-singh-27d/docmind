services:
  db:
    image: pgvector/pgvector:pg17
    container_name: docmind-db
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: docmind
      POSTGRES_PASSWORD: docmind_local
      POSTGRES_DB: docmind
    volumes:
      - docmind_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U docmind']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  docmind_pgdata:
