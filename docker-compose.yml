services:
  db:
    image: docker.io/pgvector/pgvector:pg17
    container_name: docmind-db
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: docmind
      POSTGRES_PASSWORD: docmind_local
      POSTGRES_DB: docmind
    volumes:
      - docmind_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U docmind']
      interval: 5s
      timeout: 5s
      retries: 5

  metabase:
    image: docker.io/metabase/metabase:latest
    container_name: docmind-metabase
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_USER: docmind
      MB_DB_PASS: docmind_local
      MB_DB_HOST: db
      MB_DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - docmind_metabase_data:/metabase-data

volumes:
  docmind_pgdata:
  docmind_metabase_data:
